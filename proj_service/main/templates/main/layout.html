{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title class="main-logo">SMART INDUSTRY</title>
    <link rel="stylesheet" href="{% static 'main/css/main_test.css' %}">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v6.6.0/css/all.css">
    <link rel="stylesheet" href="{% static 'orders/css/style.css' %}">
    <link rel="stylesheet" href="{% static 'orders/css/style_2.css' %}">
    {% block extra_css %}{% endblock %}
    <style>
        .main-container {
            display: flex;
            justify-content: center;
            margin-left: 0; /* Убираем фиксированное смещение */
        }

        /* Чтобы таблица не растягивалась */
        .table {
            table-layout: fixed;
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <header class="container">
            <span class="logo">SMART INDUSTRY</span>
            <nav>
                <ul>
                    <li><a href="{% url 'home' %}">Home</a></li>
                    <li><a href="{% url 'about' %}">About us</a></li>
                    <li><a href="{% url 'orders_home' %}">Orders</a></li>
                    <li><a href="{% url 'machines_home' %}">Machine</a></li>
                    <li class="btn"><a href="{% url 'schedule_home' %}">Schedule</a></li>
                </ul>
            </nav>
        </header>
    </div>

    <main class="back">
        {% block content %} {% endblock %}
    </main>
</body>
</html>
